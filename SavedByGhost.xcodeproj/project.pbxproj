			shellScript = "# --------------------------------------------------------------------------\n# CONFIGURE THESE TWO PATHS\n# --------------------------------------------------------------------------\nTARGET_FOLDER=\"${TARGET_BUILD_DIR}/${CONTENTS_FOLDER_PATH}/Frameworks/SavedByGhostKit.framework\"\nICON_IMAGE=\"${SRCROOT}/SavedByGhostKit/Assets/FrameworkIcon.png\"\n# --------------------------------------------------------------------------\n\nset -u\n\nfail() {\n  echo \"error: $1\" >&2\n  exit \"${2:-1}\"\n}\n\n# --- 1. Validate inputs ---------------------------------------------------\n\n[[ -d \"$TARGET_FOLDER\" ]] || fail \"Target folder does not exist: $TARGET_FOLDER\" 2\n[[ -f \"$ICON_IMAGE\" ]] || fail \"Icon image file does not exist: $ICON_IMAGE\" 2\n\n# --- 2. Apply the icon via Cocoa (NSWorkspace), driven by AppleScript -------\n#\n# `sips -i` / `--addicon` no longer exists, so we go through Cocoa's\n# NSWorkspace.setIcon(_:forFile:options:), which also generates a full\n# icon set (up to 512x512) rather than a single low-res icon.\n#\n# Note: setIcon: reports success even for invalid images, so we verify\n# the result ourselves afterwards rather than trusting its return value.\n\nosascript <<EOF >/dev/null\nuse framework \"Cocoa\"\nset sourcePath to \"$ICON_IMAGE\"\nset destPath to \"$TARGET_FOLDER\"\nset imageData to (current application's NSImage's alloc()'s initWithContentsOfFile:sourcePath)\nif imageData is missing value then\n  error \"Could not load image data from \" & sourcePath\nend if\n(current application's NSWorkspace's sharedWorkspace()'s setIcon:imageData forFile:destPath options:2)\nEOF\n\nosascript_status=$?\n[[ $osascript_status -eq 0 ]] || fail \"osascript failed while setting the icon (exit $osascript_status). Check that '$ICON_IMAGE' is a valid, supported image (jpeg, tiff, png, gif, jp2, pict, bmp, qtif, psd, sgi, tga).\" 1\n\necho \"Custom icon successfully applied to: $TARGET_FOLDER\"\nexit 0\n\n";
